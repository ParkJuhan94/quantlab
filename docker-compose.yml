# 로컬 dev 인프라. 명시적 name:을 지정해 compose 프로젝트명이 디렉터리명에서
# 암묵적으로 파생되지 않게 한다 - 디렉터리명이 나중에 바뀌어도(예: quantlab
# → quantlime 리네이밍) 볼륨명이 조용히 갈라지지 않도록 하기 위함.
name: quantlime

services:
  mysql:
    image: mysql:8.0
    container_name: quantlime-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-quantlime}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quantlime}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+09:00

  redis:
    image: redis:7-alpine
    container_name: quantlime-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mysql_data:
  redis_data:
