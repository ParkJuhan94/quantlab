# 단일 EC2 배포용: 정적 프론트 서빙 + 백엔드(REST/WebSocket) 리버스 프록시.
# 프론트가 same-origin(/api, /ws)으로만 요청하므로 브라우저 입장에선
# CORS가 필요 없다(백엔드 CORS 설정은 로컬 개발용 3001 포트 대상 그대로 둠).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # REST API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SockJS 핸드셰이크 + STOMP WebSocket 업그레이드
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SockJS의 롱폴/XHR 폴백 트랜스포트는 REST 요청보다 오래 걸릴 수
        # 있어 기본 60초 타임아웃을 넉넉히 늘림
        proxy_read_timeout 3600s;
    }

    # SPA 라우팅 폴백(OAuth 콜백 등 클라이언트 라우트 새로고침 대응)
    location / {
        try_files $uri /index.html;
    }
}
