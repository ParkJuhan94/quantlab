spring:
  application:
    name: quantlab
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3308}/${MYSQL_DATABASE:quantlab}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:quantlab}
  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    database-platform: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6381}

server:
  port: 8080

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:3001}

toss:
  client-id: ${TOSS_CLIENT_ID:}
  client-secret: ${TOSS_CLIENT_SECRET:}
  base-url: ${TOSS_BASE_URL:https://openapi.tossinvest.com}

kind:
  base-url: ${KIND_BASE_URL:https://kind.krx.co.kr}

upbit:
  base-url: ${UPBIT_BASE_URL:https://api.upbit.com}

python-engine:
  base-url: ${PYTHON_ENGINE_URL:http://localhost:8000}

realtime-price:
  poll-interval-ms: ${REALTIME_PRICE_POLL_INTERVAL_MS:3000}

market-ranking:
  poll-interval-ms: ${MARKET_RANKING_POLL_INTERVAL_MS:5000}

jwt:
  secret: ${JWT_SECRET:}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:1800000}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:1209600000}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me

logging:
  level:
    root: info
    com.quantlab: debug
    org.hibernate.SQL: debug
