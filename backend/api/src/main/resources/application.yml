spring:
  application:
    name: quantlab
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3308}/${MYSQL_DATABASE:quantlab}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:quantlab}
  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    database-platform: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6381}

server:
  port: 8080

# Prometheus가 스크랩할 /actuator/prometheus만 열고 나머지 actuator
# 엔드포인트는 닫아둔다(공격 표면 최소화). health는 DB/Redis 등 실제
# 의존성을 확인하는 상세 지표라 기존 /api/health(정적 200, cron 헬스체크
# 스크립트 전용)와 별개로 둔다 - 서로 다른 소비자(운영 스크립트 vs
# Prometheus/사람)를 겨냥해 의도적으로 분리 유지.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # http.server.requests에만 퍼센타일 히스토그램을 켜서 Grafana에서
      # p95/p99 지연 패널을 그릴 수 있게 한다(histogram_quantile 사용).
      # toss.api.duration/python-engine.duration 등 커스텀 Timer는 태그
      # 카디널리티가 낮고 평균 지연만으로 충분해 굳이 버킷을 늘리지 않는다.
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:3001}

toss:
  client-id: ${TOSS_CLIENT_ID:}
  client-secret: ${TOSS_CLIENT_SECRET:}
  base-url: ${TOSS_BASE_URL:https://openapi.tossinvest.com}

kind:
  base-url: ${KIND_BASE_URL:https://kind.krx.co.kr}

upbit:
  base-url: ${UPBIT_BASE_URL:https://api.upbit.com}

python-engine:
  base-url: ${PYTHON_ENGINE_URL:http://localhost:8000}

realtime-price:
  poll-interval-ms: ${REALTIME_PRICE_POLL_INTERVAL_MS:3000}

market-ranking:
  poll-interval-ms: ${MARKET_RANKING_POLL_INTERVAL_MS:100}

jwt:
  secret: ${JWT_SECRET:}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:1800000}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:1209600000}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me

logging:
  level:
    root: info
    com.quantlab: debug
    org.hibernate.SQL: debug
