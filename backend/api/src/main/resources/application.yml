spring:
  application:
    name: quantlime
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3308}/${MYSQL_DATABASE:quantlime}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:quantlime}
  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    database-platform: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6381}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

# Prometheus가 스크랩할 /actuator/prometheus만 열고 나머지 actuator
# 엔드포인트는 닫아둔다(공격 표면 최소화). health는 DB/Redis 등 실제
# 의존성을 확인하는 상세 지표라 기존 /api/health(정적 200, cron 헬스체크
# 스크립트 전용)와 별개로 둔다 - 서로 다른 소비자(운영 스크립트 vs
# Prometheus/사람)를 겨냥해 의도적으로 분리 유지.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # http.server.requests에만 퍼센타일 히스토그램을 켜서 Grafana에서
      # p95/p99 지연 패널을 그릴 수 있게 한다(histogram_quantile 사용).
      # toss.api.duration/python-engine.duration 등 커스텀 Timer는 태그
      # 카디널리티가 낮고 평균 지연만으로 충분해 굳이 버킷을 늘리지 않는다.
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:3001}
  cookie:
    # 리프레시 토큰 쿠키의 Secure 속성. HTTPS가 아니면 브라우저가 secure
    # 쿠키를 아예 저장하지 않으므로, TLS 미적용 상태인 로컬 개발과 현재
    # 프로덕션(순수 HTTP, docs/DEPLOYMENT.md 참고)에서는 반드시 false여야
    # 한다. HTTPS 적용 후 COOKIE_SECURE=true로 전환할 것.
    secure: ${COOKIE_SECURE:false}

toss:
  client-id: ${TOSS_CLIENT_ID:}
  client-secret: ${TOSS_CLIENT_SECRET:}
  base-url: ${TOSS_BASE_URL:https://openapi.tossinvest.com}

# 토스증권 Open API(toss:, 시세/캔들 조회)와는 완전히 별개 제품/인증체계 -
# 시크릿키로 매 요청 Basic Auth(TossPaymentsConfig), 토큰 발급/캐싱 불필요.
# 사업자등록 전에는 테스트 키만 쓸 수 있고, 라이브 전환 시 이 값만 교체하면 된다(§4).
toss-payments:
  client-key: ${TOSS_PAYMENTS_CLIENT_KEY:}
  secret-key: ${TOSS_PAYMENTS_SECRET_KEY:}
  webhook-secret: ${TOSS_PAYMENTS_WEBHOOK_SECRET:}
  base-url: ${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com}

subscription:
  # 빌링키(자동결제 권한 대표 토큰) 컬럼 암호화 키(base64 32바이트, AES-GCM).
  # 미설정 시 평문 저장(로컬 개발 전용) - BillingKeyConverter 참고.
  billing-key-encryption-key: ${SUBSCRIPTION_BILLING_KEY_ENCRYPTION_KEY:}

# 해외 종목(백테스트 유니버스) 연동용 - 토스는 국내 전용이라 별도 필요(CLAUDE.md §4).
# 실전 도메인 기본값(시세 조회 전용이라 모의투자 도메인 분리 불필요).
kis:
  app-key: ${KIS_APP_KEY:}
  app-secret: ${KIS_APP_SECRET:}
  base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
  master-file-base-url: ${KIS_MASTER_FILE_BASE_URL:https://new.real.download.dws.co.kr}

kind:
  base-url: ${KIND_BASE_URL:https://kind.krx.co.kr}

upbit:
  base-url: ${UPBIT_BASE_URL:https://api.upbit.com}

naver-finance:
  base-url: ${NAVER_FINANCE_BASE_URL:https://m.stock.naver.com}
  chart-base-url: ${NAVER_FINANCE_CHART_BASE_URL:https://api.stock.naver.com}

tradingview:
  base-url: ${TRADINGVIEW_BASE_URL:https://scanner.tradingview.com}

# 투자 콘텐츠 요약 피드 모듈(유튜브 채널 수집) - Data API v3, search.list는
# 일 쿼터(10,000u)를 순식간에 소모해 절대 쓰지 않고 playlistItems/videos만
# 사용한다(1u씩).
youtube:
  api-key: ${YOUTUBE_API_KEY:}
  base-url: ${YOUTUBE_BASE_URL:https://www.googleapis.com/youtube/v3}

upload:
  dir: ${UPLOAD_DIR:./uploads}
  max-size-bytes: ${UPLOAD_MAX_SIZE_BYTES:5242880}
  public-base-url: ${UPLOAD_PUBLIC_BASE_URL:http://localhost:8080}

slack:
  # 사이드패널 "의견 보내기" 기능이 전송할 Incoming Webhook URL. 비어
  # 있으면 SlackWebhookClient가 조용히 실패하지 않고 명시적으로
  # WEBHOOK_NOT_CONFIGURED 에러를 던진다(설정 누락과 실제 전송 실패를
  # 구분하기 위함).
  feedback-webhook-url: ${SLACK_FEEDBACK_WEBHOOK_URL:}

python-engine:
  base-url: ${PYTHON_ENGINE_URL:http://localhost:8000}

realtime-price:
  poll-interval-ms: ${REALTIME_PRICE_POLL_INTERVAL_MS:3000}

market-ranking:
  poll-interval-ms: ${MARKET_RANKING_POLL_INTERVAL_MS:100}

jwt:
  secret: ${JWT_SECRET:}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:1800000}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:1209600000}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me

logging:
  level:
    root: info
    com.quantlime: debug
    org.hibernate.SQL: debug
