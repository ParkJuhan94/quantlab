spring:
  application:
    name: quantlab
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3308}/${MYSQL_DATABASE:quantlab}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:quantlab}
  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    database-platform: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6381}

server:
  port: 8080

toss:
  client-id: ${TOSS_CLIENT_ID:}
  client-secret: ${TOSS_CLIENT_SECRET:}
  base-url: ${TOSS_BASE_URL:https://openapi.tossinvest.com}

logging:
  level:
    root: info
    com.quantlab: debug
    org.hibernate.SQL: debug
