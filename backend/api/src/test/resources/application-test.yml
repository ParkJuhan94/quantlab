# ApiTestSupport(@ActiveProfiles("test"))가 로드하는 프로파일 오버라이드.
# 베이스 application.yml의 jwt.secret은 ${JWT_SECRET:}로 기본값이 빈
# 문자열인데, 로컬에서는 spring-dotenv가 backend/.env(gitignore 대상)를
# 자동으로 읽어 실제 값이 채워져 테스트가 우연히 통과했다. CI의 fresh
# checkout에는 .env가 없어 빈 문자열 그대로 HMAC 키를 만들려다
# io.jsonwebtoken.security.WeakKeyException으로 AuthControllerTest/
# WatchlistControllerTest가 전부 실패했다 - 테스트가 로컬 파일 존재
# 여부에 의존하면 안 되므로, 테스트 전용 고정 시크릿을 여기 명시해
# 환경과 무관하게 항상 재현되도록 한다(HS256 최소 256비트 요구 - 아래
# 값은 그보다 충분히 김).
jwt:
  secret: test-jwt-secret-key-for-integration-test-must-be-long-enough-1234567890

# 기본값(./uploads)을 그대로 쓰면 테스트가 실제 저장소 디렉터리에 파일을
# 남긴다 - OS 임시 디렉터리로 격리한다.
upload:
  dir: ${java.io.tmpdir}/quantlime-test-uploads

# TossApiConfig가 크리덴셜 없으면 기동을 fail-fast로 막는데(빈 creds로
# invalid_client를 무한 반복하던 사고 재발 방지), ApiTestSupport의 전체
# 컨텍스트 로드가 이 검증에 걸린다 - 위 jwt.secret과 동일한 이유로 테스트
# 전용 더미 값을 고정해 환경(.env 유무)과 무관하게 컨텍스트가 뜨게 한다.
# 실제 토스 호출은 테스트에서 TossApiClient를 mock으로 격리하므로 이 값이
# 진짜일 필요는 없다.
toss:
  client-id: test-toss-client-id
  client-secret: test-toss-client-secret
