apiVersion: 1

providers:
  - name: QuantLime
    orgId: 1
    folder: QuantLime
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # docker-compose.monitoring.yml이 monitoring/grafana/dashboards를
      # 이 경로로 마운트한다.
      path: /etc/grafana/provisioning/dashboards/json
