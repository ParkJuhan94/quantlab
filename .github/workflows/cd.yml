name: CD

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # GHCR 이미지 경로는 소문자여야 하므로 고정값으로 둔다
  IMAGE_NAMESPACE: parkjuhan94/quantlime

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: quant-engine
            context: ./quant-engine
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: 빌드 + 푸시 (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          # 프론트는 same-origin 프록시 전제(nginx.conf)라 빌드 인자를
          # 비운다 - docker-compose.prod.yml의 로컬 빌드와 동일한 값
          build-args: |
            VITE_API_BASE_URL=
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_KAKAO_CLIENT_ID=${{ secrets.VITE_KAKAO_CLIENT_ID }}
            VITE_NAVER_CLIENT_ID=${{ secrets.VITE_NAVER_CLIENT_ID }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: EC2에 접속해 최신 이미지로 재기동
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/quantlime
            git pull
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml --env-file .env.prod up -d
            docker image prune -f
