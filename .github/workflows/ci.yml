name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    # TestContainerSupport가 MySQL·Redis 둘 다 Testcontainers로 격리한다
    # (2026-07-13 - 이전엔 Redis만 서비스 컨테이너로 6381에 매핑해 썼으나,
    # 실제로 로컬/CI Redis를 참조하는 테스트가 ApiTestSupport 계열뿐이라
    # 컨테이너화 후엔 불필요해짐 - CLAUDE.md 참고). 러너가 기본 제공하는
    # Docker로 별도 설정 없이 동작한다.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle 캐시
        uses: gradle/actions/setup-gradle@v4

      - name: 빌드 + 테스트
        working-directory: backend
        run: ./gradlew build

  quant-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        working-directory: quant-engine
        run: pip install -r requirements.txt

      - name: 테스트
        working-directory: quant-engine
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: 타입체크 + 빌드
        working-directory: frontend
        run: npm run build
